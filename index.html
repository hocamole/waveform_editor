<script>
"use strict";
/* =========================================================================
   Waveform Grid Editor
   - 행(row) = 신호(signal), 열(col) = 시간 스텝
   - 셀 값 종류: bit(1/0), data(버스), z(High-Z), x(Unknown), empty(빈칸)
   - 주석: 화살표 / 텍스트. 위치는 "격자 내 비율 좌표(gx,gy)"로 저장
   ========================================================================= */

/* ---------- 상수 ---------- */
const NAME_W_MIN = 84; // 신호 이름 칸 최소/기본 너비
let curNameW = NAME_W_MIN; // 현재 이름 칸 너비(가장 긴 이름에 맞춰 갱신)
const HEAD_H = 22; // 열 번호 행 높이 (.col-head height)
const PAINT_PENS = ['bit', 'data', 'z', 'x', 'shot', 'toggle', 'clear'];

/* ---------- 상태 ---------- */
let state = {
    cols: 20,
    cellW: 40,
    cellH: 44,
    signalH: 22, // 파형 진폭(셀 높이와 독립)
    lineWidth: 2,
    fillColor: '#add8e6',
    textColor: '#000000',  // 데이터 글자 색 (현재 칠할 색)
    lineColor: '#c0392b',  // 주석 선 색 (현재 색)
    annoTextColor: '#c0392b', // 주석 글자 색 (현재 색)
    signals: [],      // { name, cells:[ {t,...} ] }
    annotations: []   // 화살표/텍스트
};
let nextAnnoId = 1;
let nextBusId = 1; // 데이터 버스 식별자 (같은 값이라도 별개 버스를 구분)
let uidCounter = 0; // SVG clipPath 등 고유 id 생성용

let pen = 'bit';      // 현재 셀 펜
let tool = 'bit';     // 현재 도구 (펜 또는 주석도구)

/* ---------- DOM 참조 ---------- */
const $ = (s) => document.querySelector(s);
const gridEl   = $('#grid');
const wrapEl   = $('#grid-wrap');
const annoSvg  = $('#anno-layer');
const annoHtml = $('#anno-html');
const ctxMenu  = $('#ctx-menu');
const wdOut    = $('#wd-out');
const importIn = $('#import-in');
const importMsg= $('#import-msg');
const fileInput= $('#file-input');

/* ---------- 셀 헬퍼 ---------- */
const emptyCell = () => ({ t: 'empty' });
// 같은 버스 = 같은 id (라벨이 같아도 id가 다르면 별개 버스)
const sameData = (a, b) => a && b && a.t === 'data' && b.t === 'data' && a.id === b.id;

// 가져온 데이터 셀에 id 보정 (구버전/외부 JSON 호환)
function normalizeIds(signals) {
    let maxId = 0;
    signals.forEach(sig => {
        let prev = null;
        sig.cells.forEach(c => {
            if (c.t === 'data') {
                if (typeof c.id === 'number') maxId = Math.max(maxId, c.id);
                else if (prev && prev.t === 'data' && (prev.label || '') === (c.label || '')) c.id = prev.id;
                else c.id = ++maxId;
            }
            prev = c;
        });
    });
    nextBusId = Math.max(nextBusId, maxId + 1);
}

function makeSignal(name, cells) {
    const c = cells ? cells.slice() : [];
    while (c.length < state.cols) c.push(emptyCell());
    return { name: name || 'signal', cells: c.slice(0, state.cols) };
}

/* ---------- 초기 시드 데이터 ---------- */
function seed() {
    state.signals = [];
    // clk : 0/1 토글
    const clk = [];
    for (let i = 0; i < state.cols; i++) clk.push({ t: 'bit', v: i % 2 });
    state.signals.push(makeSignal('clk', clk));

    // req : 펄스
    const req = [];
    for (let i = 0; i < state.cols; i++) req.push({ t: 'bit', v: (i >= 3 && i <= 6) ? 1 : 0 });
    state.signals.push(makeSignal('req', req));

    // data : 버스 두 블록
    const idA = nextBusId++, idB = nextBusId++;
    const data = [];
    for (let i = 0; i < state.cols; i++) {
        if (i >= 3 && i <= 7)       data.push({ t: 'data', id: idA, label: 'A0', color: state.fillColor, tcolor: state.textColor });
        else if (i >= 8 && i <= 12) data.push({ t: 'data', id: idB, label: 'B1', color: '#1e90ff', tcolor: state.textColor });
        else                        data.push({ t: 'x' });
    }
    state.signals.push(makeSignal('data', data));

    // valid
    const v = [];
    for (let i = 0; i < state.cols; i++) v.push({ t: 'bit', v: (i >= 3 && i <= 12) ? 1 : 0 });
    state.signals.push(makeSignal('valid', v));
}

/* =========================================================================
   Undo (Ctrl+Z)
   ========================================================================= */
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 200;
function snapshot() { return JSON.stringify({ s: state, n: nextAnnoId, b: nextBusId }); }
function restoreSnap(snap) {
    const o = JSON.parse(snap);
    state = o.s;
    nextAnnoId = o.n;
    if (o.b != null) nextBusId = o.b;
    render();
}
// 모든 상태 변경(파형/주석/그리드 설정/크기 등) 직전에 호출
function pushUndo() {
    undoStack.push(snapshot());
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack.length = 0; // 새 동작이 들어오면 redo 분기 초기화
}
function undo() {
    if (!undoStack.length) return;
    redoStack.push(snapshot()); // 현재 상태를 redo 스택으로
    restoreSnap(undoStack.pop());
}
function redo() {
    if (!redoStack.length) return;
    undoStack.push(snapshot()); // 현재 상태를 undo 스택으로
    restoreSnap(redoStack.pop());
}

/* =========================================================================
   렌더링
   ========================================================================= */
/* 가장 긴 신호 이름에 맞춰 이름 칸 너비 갱신 */
function updateNameWidth() {
    const cv = updateNameWidth._cv || (updateNameWidth._cv = document.createElement('canvas'));
    const ctx = cv.getContext('2d');
    ctx.font = '600 13px "Segoe UI","Malgun Gothic",sans-serif'; // .row-name textarea 와 동일
    let max = 0;
    state.signals.forEach(s => {
        String(s.name || '').split('\n').forEach(line => {
            const w = ctx.measureText(line).width;
            if (w > max) max = w;
        });
    });
    // 손잡이(14) + textarea 좌우 패딩(16) + 여유(14)
    curNameW = Math.max(NAME_W_MIN, Math.ceil(max) + 14 + 16 + 14);
    document.documentElement.style.setProperty('--name-w', curNameW + 'px');
}

function render() {
    updateNameWidth();
    document.documentElement.style.setProperty('--cell-w', state.cellW + 'px');
    document.documentElement.style.setProperty('--cell-h', state.cellH + 'px');
    document.documentElement.style.setProperty('--data-font', Math.max(9, Math.min(14, state.cellH * 0.28)) + 'px');
    renderTable();
    renderAnnotations();
    updateWavedrom();
    // 펜/도구 버튼 활성표시
    document.querySelectorAll('.tool-btn[data-pen]').forEach(b =>
        b.classList.toggle('active', tool === b.dataset.pen));
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b =>
        b.classList.toggle('active', tool === b.dataset.tool));
    $('#cell-w-input').value = state.cellW;
    $('#cell-h-input').value = state.cellH;
    $('#signal-h-input').value = state.signalH;
    $('#row-count').value = state.signals.length;
    $('#col-count').value = state.cols;
    $('#line-width').value = state.lineWidth;
    $('#fill-color').value = state.fillColor;
    $('#data-text-color').value = state.textColor;
    $('#line-color').value = state.lineColor;
    $('#anno-text-color').value = state.annoTextColor;
    highlightSelection();   // 재렌더 후 선택 하이라이트 복원
}

function renderTable() {
    const cols = state.cols;
    let html = '<thead><tr><th class="corner">신호 \\ 시간</th>';
    for (let c = 0; c < cols; c++) html += `<th class="col-head">${c}</th>`;
    html += '</tr></thead><tbody>';

    state.signals.forEach((sig, r) => {
        html += `<tr data-r="${r}">`;
        html += `<td class="row-name">
                    <div class="rn-inner">
                        <div class="row-grip" title="드래그하여 순서 변경">⠿</div>
                        <textarea rows="1" data-r="${r}" spellcheck="false">${escapeHtml(sig.name)}</textarea>
                    </div>
                 </td>`;
        for (let c = 0; c < cols; c++) {
            const cell = sig.cells[c] || emptyCell();
            const prev = c > 0 ? sig.cells[c - 1] : null;
            const next = c < cols - 1 ? sig.cells[c + 1] : null;
            const { svg, label, ztop } = cellSVG(cell, prev, next, c);
            const z = ztop ? ' style="z-index:3"' : '';
            html += `<td class="cell" data-r="${r}" data-c="${c}"${z}>${svg}${label}</td>`;
        }
        html += '</tr>';
    });
    html += '</tbody>';
    gridEl.innerHTML = html;

    // 신호 이름 textarea 높이 자동
    gridEl.querySelectorAll('.row-name textarea').forEach(autoGrow);
}

/* 한 셀의 SVG 문자열 생성 */
function cellSVG(cell, prev, next, colIdx) {
    const W = state.cellW, H = state.cellH;
    const mid = H * 0.5;
    const amp = Math.min(state.signalH, H); // 진폭(셀 높이와 독립, 셀을 넘지 않게)
    const hi = mid - amp / 2, lo = mid + amp / 2;
    const e = Math.min(6, W * 0.18); // 데이터 버스 전환부 경사 폭 (짧게)
    const lw = state.lineWidth;
    // 굵기를 화면 픽셀 기준 고정(비균일 스케일에도 가로=세로 굵기 동일) + 코너 매끄럽게
    const pe = 'vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"';
    const open = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`;
    let body = '', label = '', ztop = false;

    if (cell.t === 'bit') {
        const y = cell.v ? hi : lo;
        let d;
        if (prev && prev.t === 'bit' && (prev.v ? hi : lo) !== y) {
            const py = prev.v ? hi : lo;
            d = `M0 ${py} L0 ${y} L${W} ${y}`; // 경계에서 수직 전환
        } else {
            d = `M0 ${y} L${W} ${y}`;
        }
        body = `<path d="${d}" fill="none" stroke="#000" stroke-width="${lw}" ${pe}/>`;

    } else if (cell.t === 'z') {
        let d = `M0 ${mid} L${W} ${mid}`;
        if (prev && prev.t === 'bit') d = `M0 ${prev.v ? hi : lo} L0 ${mid} ` + d;       // 시작: 이전 bit 레벨 → 중앙
        if (next && next.t === 'bit') d += ` M${W} ${mid} L${W} ${next.v ? hi : lo}`;     // 끝: 중앙 → 다음 bit 레벨
        body = `<path d="${d}" fill="none" stroke="#e53935" stroke-width="${lw}" ${pe}/>`;

    } else if (cell.t === 'shot') {
        // 0 레벨 가로선 + 왼쪽 경계에 굵은(선굵기+1) 세로선
        body =
            `<path d="M0 ${lo} L${W} ${lo}" fill="none" stroke="#000" stroke-width="${lw}" ${pe}/>` +
            `<path d="M0 ${hi} L0 ${lo}" fill="none" stroke="#000" stroke-width="${lw + 1}" ${pe}/>`;

    } else if (cell.t === 'toggle') {
        // 셀 안에서 위아래로 빠르게 토글 — 긴 삼각형 4개(삼각파)
        const n = 4;
        let d = `M0 ${lo}`;
        for (let k = 0; k < n; k++) {
            const xPeak = ((k + 0.5) * W / n).toFixed(1);
            const xEnd = ((k + 1) * W / n).toFixed(1);
            d += ` L${xPeak} ${hi} L${xEnd} ${lo}`;
        }
        // 좌/우 이웃에 맞춰 세로 연결선: 1 → 전체(hi→lo), data·z → 중앙까지(mid→lo)
        if (prev && prev.t === 'bit' && prev.v) d += ` M0 ${hi} L0 ${lo}`;
        else if (prev && (prev.t === 'data' || prev.t === 'z')) d += ` M0 ${mid} L0 ${lo}`;
        if (next && next.t === 'bit' && next.v) d += ` M${W} ${hi} L${W} ${lo}`;
        else if (next && (next.t === 'data' || next.t === 'z')) d += ` M${W} ${mid} L${W} ${lo}`;
        body = `<path d="${d}" fill="none" stroke="#000" stroke-width="${lw}" ${pe}/>`;

    } else if (cell.t === 'x') {
        // 데이터 버스와 같은 모양 + 내부 검정 사선 해치(1px)
        const lT = !!prev && prev.t !== 'x'; // 왼쪽 교차 — 실제 다른 값과 만날 때만(그리드 끝이면 평평)
        const rT = !!next && next.t !== 'x'; // 오른쪽 교차
        const li = lT ? e : 0, ri = rT ? e : 0;
        // 클립용 폴리곤(버스 모양)
        const pts = [];
        if (lT) pts.push([0, mid]);
        pts.push([li, hi]); pts.push([W - ri, hi]);
        if (rT) pts.push([W, mid]);
        pts.push([W - ri, lo]); pts.push([li, lo]);
        const poly = pts.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
        // 외곽선(검정): 상/하 연속선 + 시작/끝 사선
        const topPts = [], botPts = [];
        if (lT) { topPts.push([0, mid], [e, hi]); botPts.push([0, mid], [e, lo]); }
        else { topPts.push([0, hi]); botPts.push([0, lo]); }
        topPts.push([W - ri, hi]); botPts.push([W - ri, lo]);
        if (rT) { topPts.push([W, mid]); botPts.push([W, mid]); }
        const pl = a => 'M' + a.map(p => p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' L');
        const outline = pl(topPts) + ' ' + pl(botPts);
        // 내부 검정 사선 해치 (폴리곤으로 클립). 위상을 전역 x 기준으로 맞춰 셀 경계에서 끊기지 않게
        const cid = 'xh' + (uidCounter++);
        const step = 6, off = (colIdx || 0) * W;
        let hatch = '';
        const k0 = Math.ceil((hi + off) / step) * step - off; // (k+off) 가 step 배수가 되도록 정렬
        for (let k = k0; k <= W + lo; k += step) {
            hatch += `<line x1="${(k - lo).toFixed(1)}" y1="${lo}" x2="${(k - hi).toFixed(1)}" y2="${hi}"/>`;
        }
        body =
            `<clipPath id="${cid}"><polygon points="${poly}"/></clipPath>` +
            `<g clip-path="url(#${cid})" stroke="#000" stroke-width="1" fill="none" ${pe}>${hatch}</g>` +
            `<path d="${outline}" fill="none" stroke="#000" stroke-width="${lw}" ${pe}/>`;

    } else if (cell.t === 'data') {
        const isStart = !sameData(prev, cell);          // 런 시작(라벨/그룹용)
        const lT = !!prev && !sameData(prev, cell);     // 왼쪽 교차(taper) — 실제 이웃이 있을 때만
        const rT = !!next && !sameData(next, cell);     // 오른쪽 교차 — 그리드 끝이면 안 모음
        const li = lT ? e : 0;
        const ri = rT ? e : 0;
        // 채움 폴리곤
        const pts = [];
        if (lT) pts.push([0, mid]);
        pts.push([li, hi]);
        pts.push([W - ri, hi]);
        if (rT) pts.push([W, mid]);
        pts.push([W - ri, lo]);
        pts.push([li, lo]);
        const poly = pts.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
        // 상/하 경계를 각각 끊김 없는 연속 선으로 → 코너가 매끄럽게 이어짐
        const pl = a => 'M' + a.map(p => p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' L');
        const topPts = [];
        if (lT) topPts.push([0, mid], [e, hi]); else topPts.push([0, hi]);
        topPts.push([W - ri, hi]);
        if (rT) topPts.push([W, mid]);
        const botPts = [];
        if (lT) botPts.push([0, mid], [e, lo]); else botPts.push([0, lo]);
        botPts.push([W - ri, lo]);
        if (rT) botPts.push([W, mid]);
        const d = pl(topPts) + ' ' + pl(botPts);
        body =
            `<polygon points="${poly}" fill="${cell.color || state.fillColor}" fill-opacity="0.55" stroke="none"/>` +
            `<path d="${d}" fill="none" stroke="#000" stroke-width="${lw}" ${pe}/>`;
        if (isStart) {
            // 런 길이를 구해 라벨을 런 가운데로
            let runLen = 1;
            // next 들을 모를 수 있으므로 호출부에서 next만 주어짐 -> 여기선 라벨 폭을 런 길이로 못 구함.
            // 대신 라벨 폭은 셀 단위로 확장: 아래 renderTable 이후 별도 보정 대신, data-run 길이를 셀에 표시.
            label = `<div class="data-label" data-run-start="1" style="color:${cell.tcolor || state.textColor}">${escapeHtml(cell.label || '')}</div>`;
            ztop = true;
        }
    }
    // empty 는 본문 없음 (격자만)
    return { svg: open + body + '</svg>', label, ztop };
}

/* data 라벨을 런 가운데로 넓혀주는 보정 (렌더 후 1회) */
function fixDataLabels() {
    state.signals.forEach((sig, r) => {
        for (let c = 0; c < state.cols; c++) {
            const cell = sig.cells[c];
            if (cell && cell.t === 'data' && !sameData(sig.cells[c - 1], cell)) {
                let len = 1;
                while (sameData(sig.cells[c + len], cell)) len++;
                const td = gridEl.querySelector(`td.cell[data-r="${r}"][data-c="${c}"] .data-label`);
                if (td) td.style.width = (len * state.cellW) + 'px';
            }
        }
    });
}

/* =========================================================================
   주석 렌더링 (화살표 SVG + 텍스트 div)
   ========================================================================= */
// 캡처 모드에서는 열 번호 행(.col-head)이 숨겨져 셀이 위로 올라가므로 헤더 오프셋을 0으로
function headOffset() { return document.body.classList.contains('capture') ? 0 : HEAD_H; }
function gridW() { return curNameW + state.cols * state.cellW; }
function gridH() { return headOffset() + state.signals.length * state.cellH; }
function g2px(gx, gy) { return [curNameW + gx * state.cellW, headOffset() + gy * state.cellH]; }
function px2g(x, y) { return [(x - curNameW) / state.cellW, (y - headOffset()) / state.cellH]; }

let editingLineId = null; // 화살표/점선 가운데 텍스트 편집 중인 주석 id
function renderAnnotations() {
    annoSvg.setAttribute('width', gridW());
    annoSvg.setAttribute('height', gridH());
    let svg = '';
    let htmls = '';
    state.annotations.forEach(a => {
        if (a.type === 'arrow') {
            svg += arrowSVG(a);
            if ((a.text && a.text.length) || editingLineId === a.id) htmls += lineTextHTML(a);
        } else if (a.type === 'shape') {
            svg += shapeSVG(a);
            if ((a.text && a.text.length) || editingLineId === a.id) htmls += lineTextHTML(a);
        } else if (a.type === 'text') {
            htmls += textHTML(a);
        }
    });
    annoSvg.innerHTML = svg;
    annoHtml.innerHTML = htmls;
}

function arrowHead(tx, ty, ang, col) {
    const hl = 10, hw = Math.PI * 0.82;
    const ax = tx + hl * Math.cos(ang + hw), ay = ty + hl * Math.sin(ang + hw);
    const bx = tx + hl * Math.cos(ang - hw), by = ty + hl * Math.sin(ang - hw);
    return `<polygon class="anno-arrow-head" points="${tx.toFixed(1)},${ty.toFixed(1)} ${ax.toFixed(1)},${ay.toFixed(1)} ${bx.toFixed(1)},${by.toFixed(1)}" style="fill:${col}"/>`;
}
function arrowSVG(a) {
    const [x1, y1] = g2px(a.from.gx, a.from.gy);
    const [x2, y2] = g2px(a.to.gx, a.to.gy);
    const col = a.color || '#c0392b';
    const ang = Math.atan2(y2 - y1, x2 - x1);
    const mode = a.heads || (a.bi ? 'both' : 'end'); // 'end' | 'both' | 'none'(점선)
    let heads = '';
    if (mode === 'end' || mode === 'both') heads += arrowHead(x2, y2, ang, col);
    if (mode === 'both') heads += arrowHead(x1, y1, ang + Math.PI, col);
    const dash = a.dashed ? ' stroke-dasharray="6 4"' : '';
    return `<g data-anno="${a.id}">
        <path class="anno-hit" d="M${x1} ${y1} L${x2} ${y2}" stroke="transparent" stroke-width="14" fill="none"/>
        <path class="anno-arrow" d="M${x1} ${y1} L${x2} ${y2}" style="stroke:${col}"${dash}/>
        ${heads}
        <circle class="anno-handle" data-anno="${a.id}" data-end="1" cx="${x1}" cy="${y1}" r="5"/>
        <circle class="anno-handle" data-anno="${a.id}" data-end="2" cx="${x2}" cy="${y2}" r="5"/>
    </g>`;
}

/* 테두리만 있는 사각형/타원 주석. from/to 를 바운딩 박스의 두 모서리로 사용 */
function shapeSVG(a) {
    const [x1, y1] = g2px(a.from.gx, a.from.gy);
    const [x2, y2] = g2px(a.to.gx, a.to.gy);
    const col = a.color || '#c0392b';
    const x = Math.min(x1, x2), y = Math.min(y1, y2);
    const w = Math.abs(x2 - x1), h = Math.abs(y2 - y1);
    const dash = a.dashed ? ' stroke-dasharray="6 4"' : '';
    let hit, shape;
    if (a.shape === 'ellipse') {
        const cx = x + w / 2, cy = y + h / 2, rx = w / 2, ry = h / 2;
        hit   = `<ellipse class="anno-hit" cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" stroke="transparent" stroke-width="14" fill="none"/>`;
        shape = `<ellipse class="anno-arrow" cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" style="stroke:${col}" fill="none"${dash}/>`;
    } else {
        hit   = `<rect class="anno-hit" x="${x}" y="${y}" width="${w}" height="${h}" stroke="transparent" stroke-width="14" fill="none"/>`;
        shape = `<rect class="anno-arrow" x="${x}" y="${y}" width="${w}" height="${h}" style="stroke:${col}" fill="none"${dash}/>`;
    }
    return `<g data-anno="${a.id}">
        ${hit}
        ${shape}
        <circle class="anno-handle" data-anno="${a.id}" data-end="1" cx="${x1}" cy="${y1}" r="5"/>
        <circle class="anno-handle" data-anno="${a.id}" data-end="2" cx="${x2}" cy="${y2}" r="5"/>
    </g>`;
}

function textHTML(a) {
    const [x, y] = g2px(a.at.gx, a.at.gy);
    const col = a.color || '#c0392b';
    return `<div class="anno-text left" data-anno="${a.id}" contenteditable="true" spellcheck="false"
                 style="left:${x}px; top:${y}px; color:${col}">${escapeHtml(a.text || '')}</div>`;
}
/* 화살표/점선 가운데(중점)에 놓이는 텍스트 */
function lineTextHTML(a) {
    const [x1, y1] = g2px(a.from.gx, a.from.gy);
    const [x2, y2] = g2px(a.to.gx, a.to.gy);
    const col = a.tcolor || a.color || '#c0392b';
    return `<div class="anno-text line-text" data-anno="${a.id}" contenteditable="true" spellcheck="false"
                 style="left:${(x1 + x2) / 2}px; top:${(y1 + y2) / 2}px; color:${col}">${escapeHtml(a.text || '')}</div>`;
}
function editLineText(id) {
    const a = findAnno(id);
    if (!a || (a.type !== 'arrow' && a.type !== 'shape')) return;
    editingLineId = id;
    renderAnnotations();
    const el = annoHtml.querySelector(`.anno-text[data-anno="${id}"]`);
    if (el) { el.focus(); placeCaretEnd(el); }
}

/* =========================================================================
   WaveDrom 변환
   ========================================================================= */
function updateWavedrom() {
    const sigs = state.signals.map(sig => {
        let wave = '';
        const data = [];
        let prevSig = null;
        sig.cells.forEach(cell => {
            const sigKey = cellKey(cell);
            if (prevSig !== null && sigKey === prevSig) {
                wave += '.';
            } else {
                if (cell.t === 'bit')       wave += cell.v ? '1' : '0';
                else if (cell.t === 'data') { wave += '='; data.push(cell.label || ''); }
                else if (cell.t === 'z')    wave += 'z';
                else if (cell.t === 'x')    wave += 'x';
                else if (cell.t === 'shot') wave += '1'; // shot -> 그냥 1
                else if (cell.t === 'toggle') wave += '1'; // toggle -> 그냥 1
                else                        wave += 'z'; // empty -> 플로팅으로 표현
            }
            prevSig = sigKey;
        });
        const o = { name: sig.name, wave };
        if (data.length) o.data = data;
        return o;
    });
    const obj = { signal: sigs };
    wdOut.value = toWaveJson(obj);
    fixDataLabels();
}

function cellKey(cell) {
    if (cell.t === 'data') return 'data:' + cell.id;
    if (cell.t === 'bit')  return 'bit:' + cell.v;
    if (cell.t === 'empty') return 'z'; // empty 는 z 와 동일 시그니처로 묶음
    return cell.t;
}

/* 보기 좋은 WaveDrom JSON (signal 배열은 한 줄씩) */
function toWaveJson(obj) {
    let out = '{ "signal": [\n';
    out += obj.signal.map(s => '  ' + JSON.stringify(s)).join(',\n');
    out += '\n] }';
    return out;
}

/* =========================================================================
   자체 JSON 포맷 (무손실)
   ========================================================================= */
// JSON 포맷 키: 내부(t/label/tcolor) <-> 외부(type/value/textcolor) 변환
function cellOut(c) {
    const o = { type: c.t };
    if (c.id !== undefined) o.id = c.id;
    if (c.v !== undefined) o.value = c.v;         // bit 값(0/1)
    if (c.label !== undefined) o.value = c.label; // data 값(라벨) — bit/data 공존 안 함
    if (c.color !== undefined) o.color = c.color;
    if (c.tcolor !== undefined) o.textcolor = c.tcolor;
    return o;
}
function cellIn(o) {
    if (!o || typeof o !== 'object') return emptyCell();
    const c = { t: o.type };
    if (o.value !== undefined) { if (c.t === 'bit') c.v = o.value; else c.label = o.value; }
    if (o.id !== undefined) c.id = o.id;
    if (o.color !== undefined) c.color = o.color;
    if (o.textcolor !== undefined) c.tcolor = o.textcolor;
    return c;
}
function annoOut(a) {
    const o = Object.assign({}, a);
    if ('tcolor' in o) { o.textcolor = o.tcolor; delete o.tcolor; }
    return o;
}
function annoIn(a) {
    const o = Object.assign({}, a);
    if ('textcolor' in o) { o.tcolor = o.textcolor; delete o.textcolor; }
    return o;
}
function exportObject() {
    return {
        version: '1.0.0',
        grid: { cols: state.cols, cellW: state.cellW, cellH: state.cellH, signalH: state.signalH, lineWidth: state.lineWidth, fillColor: state.fillColor, textColor: state.textColor, lineColor: state.lineColor, annoTextColor: state.annoTextColor },
        signals: state.signals.map(s => ({ name: s.name, cells: s.cells.map(cellOut) })),
        annotations: state.annotations.map(annoOut)
    };
}
function exportJSONText() { return JSON.stringify(exportObject(), null, 2); }

function importFromText(text) {
    let obj;
    try { obj = JSON.parse(text); }
    catch (e) { return setMsg('JSON 파싱 실패: ' + e.message, false); }
    if (!obj || !Array.isArray(obj.signals)) return setMsg('형식이 올바르지 않습니다 (signals 누락).', false);
    pushUndo();
    const g = obj.grid || {};
    state.cols = g.cols || (obj.signals[0] && obj.signals[0].cells.length) || 20;
    state.cellW = g.cellW || 40;
    state.cellH = g.cellH || 44;
    state.signalH = g.signalH || 22;
    state.lineWidth = g.lineWidth || 2;
    state.fillColor = g.fillColor || '#add8e6';
    state.textColor = g.textColor || '#000000';
    state.lineColor = g.lineColor || '#c0392b';
    state.annoTextColor = g.annoTextColor || '#c0392b';
    $('#fill-color').value = state.fillColor;
    $('#data-text-color').value = state.textColor;
    $('#line-color').value = state.lineColor;
    $('#anno-text-color').value = state.annoTextColor;
    state.signals = obj.signals.map(s => makeSignal(s.name, (s.cells || []).map(cellIn)));
    normalizeIds(state.signals);
    state.annotations = (obj.annotations || []).map(a => {
        a = annoIn(a);
        a.id = a.id || nextAnnoId++;
        if (a.id >= nextAnnoId) nextAnnoId = a.id + 1;
        return a;
    });
    render();
    setMsg('불러오기 완료.', true);
}
function setMsg(text, ok) {
    importMsg.textContent = text;
    importMsg.className = ok ? 'ok' : 'err';
}

/* =========================================================================
   캡처 이미지 (JPG) — 캡처 모드 모양(격자/번호 없음)을 standalone SVG로 재구성
   ========================================================================= */
const SVG_FONT = 'Segoe UI,Malgun Gothic,sans-serif';
function captureTextLines(x, y, text, col, size, anchor) {
    const lines = String(text).split('\n');
    const lh = size * 1.25;
    const startY = y - (lines.length - 1) * lh / 2;
    const tspans = lines.map((ln, i) =>
        `<tspan x="${x}" dy="${i === 0 ? 0 : lh}">${escapeHtml(ln)}</tspan>`).join('');
    return `<text x="${x}" y="${startY}" text-anchor="${anchor}" dominant-baseline="middle"` +
        ` font-family="${SVG_FONT}" font-size="${size}" font-weight="600"` +
        ` fill="${col}" stroke="#fff" stroke-width="3" paint-order="stroke">${tspans}</text>`;
}
function buildCaptureSVG() {
    const cw = state.cellW, ch = state.cellH;
    const W = curNameW + state.cols * cw;
    const H = state.signals.length * ch;
    const cg = (gx, gy) => [curNameW + gx * cw, gy * ch]; // 헤더 없음(offset 0)
    const parts = [`<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>`];

    const labels = []; // 데이터 라벨은 모든 셀 위에 그려야 함(반투명 채움에 덮이지 않도록)
    state.signals.forEach((sig, r) => {
        const y0 = r * ch;
        // 신호 이름 (좌측, 세로 중앙)
        const lines = String(sig.name || '').split('\n');
        const lh = 16, sy = y0 + ch / 2 - (lines.length - 1) * lh / 2;
        lines.forEach((ln, i) => {
            parts.push(`<text x="8" y="${sy + i * lh}" font-family="${SVG_FONT}" font-size="13"` +
                ` font-weight="600" fill="#333" dominant-baseline="middle">${escapeHtml(ln)}</text>`);
        });
        // 파형 (셀 SVG 재사용 → 위치 지정 nested svg)
        for (let c = 0; c < state.cols; c++) {
            const cell = sig.cells[c] || emptyCell();
            const prev = c > 0 ? sig.cells[c - 1] : null;
            const next = c < state.cols - 1 ? sig.cells[c + 1] : null;
            const { svg } = cellSVG(cell, prev, next, c);
            const x0 = curNameW + c * cw;
            parts.push(svg
                .replace('<svg ', `<svg x="${x0}" y="${y0}" width="${cw}" height="${ch}" `)
                .replace(/ vector-effect="non-scaling-stroke"/g, ''));
            // 데이터 라벨 (런 가운데) — 나중에 맨 위에 그림
            if (cell.t === 'data' && !sameData(prev, cell) && (cell.label || '') !== '') {
                let len = 1; while (sameData(sig.cells[c + len], cell)) len++;
                labels.push(`<text x="${curNameW + (c + len / 2) * cw}" y="${y0 + ch / 2}"` +
                    ` text-anchor="middle" dominant-baseline="middle" font-family="${SVG_FONT}"` +
                    ` font-size="11" font-weight="600" fill="${cell.tcolor || state.textColor}">${escapeHtml(cell.label)}</text>`);
            }
        }
    });
    parts.push(...labels); // 모든 셀 채움 위에 데이터 라벨

    // 주석
    state.annotations.forEach(a => {
        if (a.type === 'arrow') {
            const [x1, y1] = cg(a.from.gx, a.from.gy);
            const [x2, y2] = cg(a.to.gx, a.to.gy);
            const col = a.color || '#c0392b';
            const ang = Math.atan2(y2 - y1, x2 - x1);
            const mode = a.heads || (a.bi ? 'both' : 'end');
            const dash = a.dashed ? ' stroke-dasharray="6 4"' : '';
            parts.push(`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="2"${dash}/>`);
            if (mode === 'end' || mode === 'both') parts.push(arrowHead(x2, y2, ang, col));
            if (mode === 'both') parts.push(arrowHead(x1, y1, ang + Math.PI, col));
            if (a.text) parts.push(captureTextLines((x1 + x2) / 2, (y1 + y2) / 2, a.text, a.tcolor || col, 12, 'middle'));
        } else if (a.type === 'shape') {
            const [x1, y1] = cg(a.from.gx, a.from.gy);
            const [x2, y2] = cg(a.to.gx, a.to.gy);
            const col = a.color || '#c0392b';
            const x = Math.min(x1, x2), y = Math.min(y1, y2);
            const w = Math.abs(x2 - x1), h = Math.abs(y2 - y1);
            const dash = a.dashed ? ' stroke-dasharray="6 4"' : '';
            if (a.shape === 'ellipse')
                parts.push(`<ellipse cx="${x + w / 2}" cy="${y + h / 2}" rx="${w / 2}" ry="${h / 2}" fill="none" stroke="${col}" stroke-width="2"${dash}/>`);
            else
                parts.push(`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="none" stroke="${col}" stroke-width="2"${dash}/>`);
            if (a.text) parts.push(captureTextLines(x + w / 2, y + h / 2, a.text, a.tcolor || col, 12, 'middle'));
        } else if (a.type === 'text') {
            const [x, y] = cg(a.at.gx, a.at.gy);
            parts.push(captureTextLines(x, y, a.text || '', a.color || '#c0392b', 12, 'start'));
        }
    });

    return { inner: parts.join('\n'), W, H };
}
function saveCaptureJPG() {
    const { inner, W, H } = buildCaptureSVG();
    const scale = 2;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${W * scale}" height="${H * scale}" viewBox="0 0 ${W} ${H}">${inner}</svg>`;
    const url = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml;charset=utf-8' }));
    const img = new Image();
    img.onload = () => {
        const cv = document.createElement('canvas');
        cv.width = W * scale; cv.height = H * scale;
        const ctx = cv.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, cv.width, cv.height);
        ctx.drawImage(img, 0, 0, cv.width, cv.height);
        URL.revokeObjectURL(url);
        cv.toBlob(b => { if (b) saveBlob(b, 'waveform.jpg', 'image/jpeg', ['.jpg', '.jpeg']); }, 'image/jpeg', 0.95);
    };
    img.onerror = () => { URL.revokeObjectURL(url); alert('캡처 이미지 생성에 실패했습니다.'); };
    img.src = url;
}
async function saveBlob(blob, name, mime, exts) {
    if (window.showSaveFilePicker) {
        try {
            const h = await window.showSaveFilePicker({ suggestedName: name, types: [{ accept: { [mime]: exts } }] });
            const w = await h.createWritable(); await w.write(blob); await w.close(); return;
        } catch (e) { if (e.name === 'AbortError') return; }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
}

/* =========================================================================
   셀 그리기 (펜)
   ========================================================================= */
let painting = null;        // { level } 또는 null  (bit/z/x/clear 용)
let paintUndoPushed = false; // 드래그 1회당 undo 한 번만
let dataDrag = null;        // 데이터 버스 미리보기 드래그 상태

/* ---------- 셀 복사/붙여넣기 ---------- */
let selRect = null;  // 선택 영역 {r0,c0,r1,c1} (정규화됨)
let selDrag = null;  // 선택 드래그 시작점 {r0,c0}
let clip = null;     // 복사된 셀 {rows, cols, cells:[[셀,...]]}
let pendingCut = null; // 잘라내기 대기 영역 {r0,c0,r1,c1} — 붙여넣을 때 비움

function normRect(r0, c0, r1, c1) {
    return { r0: Math.min(r0, r1), c0: Math.min(c0, c1), r1: Math.max(r0, r1), c1: Math.max(c0, c1) };
}
function highlightSelection() {
    gridEl.querySelectorAll('td.cell.cell-sel').forEach(td => td.classList.remove('cell-sel'));
    if (!selRect || tool !== 'select') return;
    for (let r = selRect.r0; r <= selRect.r1; r++)
        for (let c = selRect.c0; c <= selRect.c1; c++) {
            const td = gridEl.querySelector(`td.cell[data-r="${r}"][data-c="${c}"]`);
            if (td) td.classList.add('cell-sel');
        }
}
function copySelection() {
    if (!selRect) return;
    const cells = [];
    for (let r = selRect.r0; r <= selRect.r1; r++) {
        const sig = state.signals[r];
        const row = [];
        for (let c = selRect.c0; c <= selRect.c1; c++)
            row.push(JSON.parse(JSON.stringify((sig && sig.cells[c]) || emptyCell())));
        cells.push(row);
    }
    clip = { rows: cells.length, cols: cells[0].length, cells };
    pendingCut = null;       // 일반 복사는 잘라내기 대기 해제
}
function cutSelection() {
    if (!selRect) return;
    copySelection();
    pendingCut = { ...selRect };   // 지금은 지우지 않고, 붙여넣을 때 비움
}
function pasteClipboard() {
    if (!clip || !selRect) return;
    const r0 = selRect.r0, c0 = selRect.c0;
    pushUndo();
    // 잘라내기 원본 비우기(붙여넣기 전에 처리 → 겹쳐도 붙여넣은 셀이 보존됨)
    if (pendingCut) {
        for (let r = pendingCut.r0; r <= pendingCut.r1; r++) {
            const sig = state.signals[r];
            if (!sig) continue;
            for (let c = pendingCut.c0; c <= pendingCut.c1 && c < sig.cells.length; c++) sig.cells[c] = emptyCell();
        }
        pendingCut = null;
    }
    // 모자라면 그리드 확장
    if (c0 + clip.cols > state.cols) setCols(c0 + clip.cols);
    if (r0 + clip.rows > state.signals.length) setRows(r0 + clip.rows);
    // 데이터 버스 id 재매핑(붙여넣은 버스가 기존 버스와 충돌하지 않도록)
    const idMap = new Map();
    for (let i = 0; i < clip.rows; i++) {
        const sig = state.signals[r0 + i];
        for (let j = 0; j < clip.cols; j++) {
            const cell = JSON.parse(JSON.stringify(clip.cells[i][j]));
            if (cell.t === 'data' && cell.id != null) {
                if (!idMap.has(cell.id)) idMap.set(cell.id, nextBusId++);
                cell.id = idMap.get(cell.id);
            }
            sig.cells[c0 + j] = cell;
        }
    }
    selRect = normRect(r0, c0, r0 + clip.rows - 1, c0 + clip.cols - 1);
    render();
}

function sameCell(a, b) {
    if (!a || a.t !== b.t) return false;
    if (a.t === 'bit') return a.v === b.v;
    if (a.t === 'data') return (a.label || '') === (b.label || '');
    return true;
}
/* 펜을 한 셀에 적용. 실제 변화가 있으면 true (없으면 렌더 안 함 → 더블클릭 보존) */
function applyPen(r, c, level) {
    const sig = state.signals[r];
    if (!sig) return false;
    const cur = sig.cells[c];
    let next;
    if (pen === 'bit')        next = { t: 'bit', v: level };
    else if (pen === 'data') { if (cur.t === 'data') return false; next = { t: 'data', label: '' }; }
    else if (pen === 'z')     next = { t: 'z' };
    else if (pen === 'x')     next = { t: 'x' };
    else if (pen === 'shot')  next = { t: 'shot' };
    else if (pen === 'toggle') next = { t: 'toggle' };
    else if (pen === 'clear') next = emptyCell();
    else return false;
    if (sameCell(cur, next)) return false;
    if (!paintUndoPushed) { pushUndo(); paintUndoPushed = true; }
    sig.cells[c] = next;
    return true;
}

gridEl.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    const td = e.target.closest('td.cell');
    if (!td) return;
    const r = +td.dataset.r, c = +td.dataset.c;

    // 채우기 도구: 클릭한 버스에 현재 데이터 색을 칠함
    if (tool === 'fill') {
        e.preventDefault();
        const cell = state.signals[r].cells[c];
        if (cell && cell.t === 'data') { pushUndo(); fillBus(r, c); render(); }
        return;
    }

    // 셀 선택(복사/붙여넣기): 드래그로 영역 선택
    if (tool === 'select') {
        e.preventDefault();
        selDrag = { r0: r, c0: c };
        selRect = normRect(r, c, r, c);
        highlightSelection();
        return;
    }

    if (!PAINT_PENS.includes(tool)) return; // 주석 도구일 땐 무시
    e.preventDefault();

    // 데이터 버스: 드래그하는 동안 미리보기, 놓는 순간 확정
    if (pen === 'data') {
        const sig = state.signals[r];
        dataDrag = { r, startC: c, endC: c, busId: nextBusId++, orig: sig.cells.slice(), moved: false };
        document.body.classList.add('painting');
        return;
    }

    let level = 1;
    if (pen === 'bit') {
        const rect = td.getBoundingClientRect();
        level = (e.clientY - rect.top) < rect.height / 2 ? 1 : 0;
    }
    paintUndoPushed = false;
    painting = { level };
    document.body.classList.add('painting');
    if (applyPen(r, c, level)) render();
});

/* 데이터 버스 미리보기 (드래그 중) */
function previewData() {
    const sig = state.signals[dataDrag.r];
    sig.cells = dataDrag.orig.slice();
    const a = Math.min(dataDrag.startC, dataDrag.endC);
    const b = Math.max(dataDrag.startC, dataDrag.endC);
    for (let i = a; i <= b; i++) sig.cells[i] = { t: 'data', id: dataDrag.busId, label: '', color: state.fillColor, tcolor: state.textColor };
    render();
}

/* 채우기: 클릭한 셀이 속한 버스(연속 같은 id)에 현재 채움색·글자색 적용 */
function fillBus(r, c) {
    const sig = state.signals[r];
    const cell = sig.cells[c];
    if (!cell || cell.t !== 'data') return;
    const color = $('#fill-color').value;
    const tcolor = $('#data-text-color').value;
    let start = c; while (start > 0 && sameData(sig.cells[start - 1], cell)) start--;
    let end = c;   while (end < state.cols - 1 && sameData(sig.cells[end + 1], cell)) end++;
    for (let i = start; i <= end; i++) { sig.cells[i].color = color; sig.cells[i].tcolor = tcolor; }
}

/* 데이터 셀 더블클릭 -> 라벨 편집 */
gridEl.addEventListener('dblclick', e => {
    const td = e.target.closest('td.cell');
    if (!td) return;
    const r = +td.dataset.r, c = +td.dataset.c;
    const cell = state.signals[r].cells[c];
    if (cell.t === 'data') editDataLabel(r, c);
});

function editDataLabel(r, c) {
    const sig = state.signals[r];
    const cell = sig.cells[c];
    // 런 시작 위치 찾기
    let start = c;
    while (start > 0 && sameData(sig.cells[start - 1], cell)) start--;
    let len = 1;
    while (sameData(sig.cells[start + len], cell)) len++;
    const td = gridEl.querySelector(`td.cell[data-r="${r}"][data-c="${start}"]`);
    const rect = td.getBoundingClientRect();
    const wrapRect = wrapEl.getBoundingClientRect();
    const ghost = td.querySelector('.data-label'); // 편집 중엔 원래 라벨 숨김(겹침 방지)
    if (ghost) ghost.style.visibility = 'hidden';
    const inp = document.createElement('input');
    inp.className = 'lbl-edit';
    inp.value = cell.label || '';
    inp.style.left = (rect.left - wrapRect.left) + 'px';
    inp.style.top  = (rect.top - wrapRect.top) + 'px';
    inp.style.width = (len * state.cellW) + 'px';
    inp.style.color = inp.style.caretColor = cell.tcolor || state.textColor;
    wrapEl.appendChild(inp);
    inp.focus(); inp.select();
    let done = false;
    const commit = () => {
        if (done) return; done = true;
        pushUndo();
        const label = inp.value;
        for (let i = start; i < start + len; i++) sig.cells[i] = { t: 'data', id: cell.id, label, color: sig.cells[i].color, tcolor: sig.cells[i].tcolor };
        inp.remove();
        render();
    };
    const cancel = () => {
        if (done) return; done = true;
        inp.remove();
        render();
    };
    inp.addEventListener('keydown', ev => {
        if (ev.key === 'Enter') { ev.preventDefault(); commit(); }
        else if (ev.key === 'Escape') { ev.preventDefault(); cancel(); }
    });
    inp.addEventListener('blur', commit);
}

/* =========================================================================
   신호 이름 편집 / 행 순서 변경 / 컨텍스트 메뉴
   ========================================================================= */
gridEl.addEventListener('input', e => {
    const ta = e.target.closest('.row-name textarea');
    if (!ta) return;
    const r = +ta.dataset.r;
    state.signals[r].name = ta.value;
    autoGrow(ta);
    updateNameWidth();      // 가장 긴 이름에 맞춰 칸 너비 갱신(타이핑 중에도)
    renderAnnotations();    // 격자 이동에 맞춰 주석 위치 보정(표는 그대로라 포커스 유지)
    updateWavedrom();
});

function autoGrow(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, state.cellH - 4) + 'px';
}

/* 행(신호) 드래그 재정렬 */
let rowDrag = null;
gridEl.addEventListener('mousedown', e => {
    const grip = e.target.closest('.row-grip');
    if (!grip) return;
    e.preventDefault();
    const tr = grip.closest('tr');
    rowDrag = { from: +tr.dataset.r, overTr: null, after: false };
    document.body.classList.add('row-dragging');
    tr.classList.add('row-drag-src');
});
document.addEventListener('mousemove', e => {
    if (!rowDrag) return;
    const tr = e.target.closest && e.target.closest('tr[data-r]');
    gridEl.querySelectorAll('.drop-before,.drop-after').forEach(x => x.classList.remove('drop-before', 'drop-after'));
    if (tr) {
        const rect = tr.getBoundingClientRect();
        const after = (e.clientY - rect.top) > rect.height / 2;
        tr.classList.add(after ? 'drop-after' : 'drop-before');
        rowDrag.overTr = +tr.dataset.r;
        rowDrag.after = after;
    }
});

/* 셀 페인팅 / 행드래그 / 기타 공통 mouseup, mousemove */
document.addEventListener('mousemove', e => {
    if (dataDrag) {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const td = el && el.closest && el.closest('td.cell');
        if (td && +td.dataset.r === dataDrag.r) {
            const c = +td.dataset.c;
            if (c !== dataDrag.endC) {
                dataDrag.endC = c;
                if (c !== dataDrag.startC) dataDrag.moved = true;
                previewData();
            }
        }
        return;
    }
    if (selDrag) {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const td = el && el.closest && el.closest('td.cell');
        if (td) { selRect = normRect(selDrag.r0, selDrag.c0, +td.dataset.r, +td.dataset.c); highlightSelection(); }
        return;
    }
    if (painting) {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const td = el && el.closest && el.closest('td.cell');
        if (td && applyPen(+td.dataset.r, +td.dataset.c, painting.level)) render();
    }
});
document.addEventListener('mouseup', () => {
    if (dataDrag) {
        const sig = state.signals[dataDrag.r];
        const startCell = dataDrag.orig[dataDrag.startC];
        // 움직였거나, 빈/비데이터 셀에서 시작했으면 확정. (기존 data 셀 단순 클릭은 더블클릭 편집을 위해 보존)
        const commit = dataDrag.moved || !(startCell && startCell.t === 'data');
        if (commit) {
            sig.cells = dataDrag.orig.slice();
            pushUndo();
            const a = Math.min(dataDrag.startC, dataDrag.endC);
            const b = Math.max(dataDrag.startC, dataDrag.endC);
            for (let i = a; i <= b; i++) sig.cells[i] = { t: 'data', id: dataDrag.busId, label: '', color: state.fillColor, tcolor: state.textColor };
            render();
        }
        document.body.classList.remove('painting');
        dataDrag = null;
    }
    if (painting) { painting = null; document.body.classList.remove('painting'); }
    if (selDrag) { selDrag = null; }
    if (rowDrag) {
        const { from, overTr, after } = rowDrag;
        if (overTr !== null && overTr !== from) {
            pushUndo();
            let to = overTr + (after ? 1 : 0);
            const [moved] = state.signals.splice(from, 1);
            if (from < to) to--;
            state.signals.splice(to, 0, moved);
            render();
        }
        document.body.classList.remove('row-dragging');
        gridEl.querySelectorAll('.row-drag-src,.drop-before,.drop-after')
            .forEach(x => x.classList.remove('row-drag-src', 'drop-before', 'drop-after'));
        rowDrag = null;
    }
});

/* 우클릭 컨텍스트 메뉴 */
gridEl.addEventListener('contextmenu', e => {
    const cellTd = e.target.closest('td.cell');
    const nameTd = e.target.closest('.row-name');
    if (!cellTd && !nameTd) return;
    e.preventDefault();
    const r = +(cellTd || nameTd.querySelector('textarea')).dataset.r;
    const c = cellTd ? +cellTd.dataset.c : null;
    const items = [];
    if (c !== null) {
        items.push(['왼쪽에 열 추가', () => { insertCol(c); }]);
        items.push(['오른쪽에 열 추가', () => { insertCol(c + 1); }]);
        items.push(['이 열 삭제', () => { deleteCol(c); }]);
        items.push(['hr']);
    }
    items.push(['위에 신호 추가', () => { insertSignal(r); }]);
    items.push(['아래에 신호 추가', () => { insertSignal(r + 1); }]);
    items.push(['CLK 생성', () => { makeClock(r); }]);
    items.push(['신호 삭제', () => { deleteSignal(r); }, 'danger']);
    showCtx(e.clientX, e.clientY, items);
});
function showCtx(x, y, items) {
    ctxMenu.innerHTML = '';
    items.forEach(it => {
        if (it[0] === 'hr') { ctxMenu.appendChild(document.createElement('hr')); return; }
        const b = document.createElement('button');
        b.textContent = it[0];
        if (it[2]) b.className = it[2];
        b.onclick = () => { hideCtx(); it[1](); };
        ctxMenu.appendChild(b);
    });
    ctxMenu.style.left = x + 'px';
    ctxMenu.style.top = y + 'px';
    ctxMenu.style.display = 'block';
}
function hideCtx() { ctxMenu.style.display = 'none'; }
document.addEventListener('mousedown', e => { if (!e.target.closest('#ctx-menu')) hideCtx(); });

/* 그리드 조작 */
function insertSignal(idx) {
    pushUndo();
    state.signals.splice(idx, 0, makeSignal('signal' + (state.signals.length + 1), []));
    render();
}
async function makeClock(idx) {
    const sig = state.signals[idx];
    if (!sig) return;
    const ans = await askNumber('CLK 주기(셀 개수)를 입력하세요.', 2);
    if (ans === null) return;                 // 취소
    let p = Math.round(Number(ans));
    if (!isFinite(p) || p < 1) p = 2;
    // 한 주기 = 0을 ceil(p/2)개, 1을 floor(p/2)개 (홀수면 0이 하나 더 많음)
    const zeros = Math.ceil(p / 2);
    pushUndo();
    for (let i = 0; i < state.cols; i++) {
        const phase = i % p;
        sig.cells[i] = { t: 'bit', v: phase < zeros ? 0 : 1 };
    }
    render();
}
function deleteSignal(idx) {
    if (state.signals.length <= 1) return;
    pushUndo();
    state.signals.splice(idx, 1);
    render();
}
function insertCol(c) {
    pushUndo();
    state.cols++;
    state.signals.forEach(s => s.cells.splice(c, 0, emptyCell()));
    render();
}
function deleteCol(c) {
    if (state.cols <= 1) return;
    pushUndo();
    state.cols--;
    state.signals.forEach(s => s.cells.splice(c, 1));
    render();
}

/* =========================================================================
   주석 도구 (화살표 그리기 / 텍스트 / 이동 / 삭제)
   ========================================================================= */
let annoDrag = null; // 화살표 그리기 또는 주석 이동

function wrapPx(e) {
    const rect = annoSvg.getBoundingClientRect();
    return [e.clientX - rect.left, e.clientY - rect.top];
}

/* anno-layer: 화살표 그리기 시작 / 텍스트 배치 / (이동/삭제는 요소에서 처리) */
annoSvg.addEventListener('mousedown', e => {
    if (tool === 'arrow' || tool === 'darrow' || tool === 'dline') {
        e.preventDefault();
        const [px, py] = wrapPx(e);
        const [gx, gy] = px2g(px, py);
        pushUndo();
        const heads = tool === 'darrow' ? 'both' : tool === 'dline' ? 'none' : 'end';
        const dashed = tool === 'dline';
        const a = { id: nextAnnoId++, type: 'arrow', from: { gx, gy }, to: { gx, gy }, heads, dashed, color: state.lineColor, tcolor: state.annoTextColor, text: '' };
        state.annotations.push(a);
        annoDrag = { kind: 'new-arrow', a };
        renderAnnotations();
    } else if (tool === 'rect' || tool === 'ellipse') {
        e.preventDefault();
        const [px, py] = wrapPx(e);
        const [gx, gy] = px2g(px, py);
        pushUndo();
        const a = { id: nextAnnoId++, type: 'shape', shape: tool, from: { gx, gy }, to: { gx, gy }, color: state.lineColor, tcolor: state.annoTextColor, text: '' };
        state.annotations.push(a);
        annoDrag = { kind: 'new-shape', a };
        renderAnnotations();
    } else if (tool === 'text') {
        e.preventDefault();
        const [px, py] = wrapPx(e);
        const [gx, gy] = px2g(px, py);
        pushUndo();
        const a = { id: nextAnnoId++, type: 'text', at: { gx, gy }, text: '', color: state.annoTextColor };
        state.annotations.push(a);
        renderAnnotations();
        // 새 텍스트에 포커스
        const el = annoHtml.querySelector(`.anno-text[data-anno="${a.id}"]`);
        if (el) { placeCaretEnd(el); el.focus(); }
    } else if (tool === 'move') {
        const handle = e.target.closest('.anno-handle');
        const hit = e.target.closest('.anno-hit');
        if (handle) {
            e.preventDefault();
            const a = findAnno(+handle.dataset.anno);
            pushUndo();
            annoDrag = { kind: 'handle', a, end: handle.dataset.end };
            document.body.classList.add('anno-moving');
        } else if (hit) {
            e.preventDefault();
            const a = findAnno(+hit.closest('[data-anno]').dataset.anno);
            pushUndo();
            const [px, py] = wrapPx(e);
            annoDrag = { kind: 'move-arrow', a, start: px2g(px, py) };
            document.body.classList.add('anno-moving');
        }
    } else if (tool === 'erase') {
        const g = e.target.closest('[data-anno]');
        if (g) { pushUndo(); removeAnno(+g.dataset.anno); }
    } else if (tool === 'annoapply') {
        const g = e.target.closest('[data-anno]');
        if (g) { pushUndo(); applyAnnoColor(+g.dataset.anno); }
    }
});

/* 적용: 클릭한 주석에 현재 선/글자색 적용 */
function applyAnnoColor(id) {
    const a = findAnno(id);
    if (!a) return;
    if (a.type === 'arrow' || a.type === 'shape') { a.color = state.lineColor; a.tcolor = state.annoTextColor; }
    else if (a.type === 'text') { a.color = state.annoTextColor; }
    renderAnnotations();
}

/* 화살표/점선 더블클릭 -> 가운데 텍스트 편집 */
annoSvg.addEventListener('dblclick', e => {
    const g = e.target.closest('[data-anno]');
    if (!g) return;
    const a = findAnno(+g.dataset.anno);
    if (a && (a.type === 'arrow' || a.type === 'shape')) { e.preventDefault(); editLineText(a.id); }
});

/* 텍스트/가운데텍스트 주석: 이동/삭제 (anno-html 위임) */
annoHtml.addEventListener('mousedown', e => {
    const el = e.target.closest('.anno-text');
    if (!el) return;
    const id = +el.dataset.anno;
    const a = findAnno(id);
    if (tool === 'erase') { e.preventDefault(); pushUndo(); removeAnno(id); }
    else if (tool === 'annoapply') { e.preventDefault(); pushUndo(); applyAnnoColor(id); }
    else if (tool === 'move') {
        e.preventDefault();
        pushUndo();
        const [px, py] = wrapPx(e);
        // 화살표/점선/도형의 가운데 텍스트는 전체를 이동, 독립 텍스트는 자기만 이동
        if (a && (a.type === 'arrow' || a.type === 'shape')) annoDrag = { kind: 'move-arrow', a, start: px2g(px, py) };
        else annoDrag = { kind: 'move-text', a, start: px2g(px, py) };
        document.body.classList.add('anno-moving');
    }
    // 그 외(기본): contenteditable 로 편집
});
annoHtml.addEventListener('input', e => {
    const el = e.target.closest('.anno-text');
    if (!el) return;
    const a = findAnno(+el.dataset.anno);
    if (a) a.text = el.innerText; // 줄바꿈 보존
});
annoHtml.addEventListener('blur', e => {
    const el = e.target.closest('.anno-text');
    if (!el) return;
    editingLineId = null;
    const a = findAnno(+el.dataset.anno);
    // 독립 텍스트 주석이 비어 있으면 삭제. (화살표/점선의 빈 텍스트는 선은 유지)
    if (a && a.type === 'text' && !el.innerText.trim()) removeAnno(+el.dataset.anno);
    else renderAnnotations();
}, true);

document.addEventListener('mousemove', e => {
    if (!annoDrag) return;
    const [px, py] = wrapPx(e);
    let [gx, gy] = px2g(px, py);
    const a = annoDrag.a;
    const isShape = a.type === 'shape';
    if (annoDrag.kind === 'new-arrow' || annoDrag.kind === 'new-shape' || (annoDrag.kind === 'handle' && annoDrag.end === '2')) {
        if (e.shiftKey) {
            if (isShape) { // Shift: 정사각형/원(가로=세로)
                const s = Math.min(Math.abs(gx - a.from.gx), Math.abs(gy - a.from.gy));
                gx = a.from.gx + Math.sign(gx - a.from.gx) * s;
                gy = a.from.gy + Math.sign(gy - a.from.gy) * s;
            } else { // Shift: from 기준 수평/수직 고정
                if (Math.abs(gx - a.from.gx) >= Math.abs(gy - a.from.gy)) gy = a.from.gy; else gx = a.from.gx;
            }
        }
        a.to = { gx, gy };
    } else if (annoDrag.kind === 'handle' && annoDrag.end === '1') {
        if (e.shiftKey) {
            if (isShape) { // Shift: 정사각형/원(가로=세로)
                const s = Math.min(Math.abs(gx - a.to.gx), Math.abs(gy - a.to.gy));
                gx = a.to.gx + Math.sign(gx - a.to.gx) * s;
                gy = a.to.gy + Math.sign(gy - a.to.gy) * s;
            } else { // Shift: to 기준 수평/수직 고정
                if (Math.abs(gx - a.to.gx) >= Math.abs(gy - a.to.gy)) gy = a.to.gy; else gx = a.to.gx;
            }
        }
        a.from = { gx, gy };
    } else if (annoDrag.kind === 'move-arrow') {
        const dx = gx - annoDrag.start[0], dy = gy - annoDrag.start[1];
        a.from.gx += dx; a.from.gy += dy; a.to.gx += dx; a.to.gy += dy;
        annoDrag.start = [gx, gy];
    } else if (annoDrag.kind === 'move-text') {
        a.at = { gx, gy };
    }
    renderAnnotations();
});
document.addEventListener('mouseup', () => {
    if (annoDrag) {
        if (annoDrag.kind === 'new-arrow' || annoDrag.kind === 'new-shape') {
            const a = annoDrag.a;
            const [x1, y1] = g2px(a.from.gx, a.from.gy);
            const [x2, y2] = g2px(a.to.gx, a.to.gy);
            annoDrag = null;
            document.body.classList.remove('anno-moving');
            if (Math.hypot(x2 - x1, y2 - y1) < 6) { removeAnno(a.id); }
            else { renderAnnotations(); editLineText(a.id); } // 그린 직후 가운데 텍스트 입력
            return;
        }
        annoDrag = null;
        document.body.classList.remove('anno-moving');
        renderAnnotations();
    }
});

function findAnno(id) { return state.annotations.find(a => a.id === id); }
function removeAnno(id) {
    state.annotations = state.annotations.filter(a => a.id !== id);
    renderAnnotations();
}

/* =========================================================================
   리사이즈 핸들 (셀 크기는 고정 · 드래그로 열/행 "개수"를 늘리고 줄임)
   ========================================================================= */
function setCols(n) {
    n = clamp(n, 1, 500);
    if (n === state.cols) return;
    if (n > state.cols) {
        const add = n - state.cols;
        state.signals.forEach(s => { for (let i = 0; i < add; i++) s.cells.push(emptyCell()); });
    } else {
        state.signals.forEach(s => { s.cells.length = n; });
    }
    state.cols = n;
}
function setRows(n) {
    n = clamp(n, 1, 200);
    if (n === state.signals.length) return;
    if (n > state.signals.length) {
        while (state.signals.length < n)
            state.signals.push(makeSignal('signal' + (state.signals.length + 1), []));
    } else {
        state.signals.length = n;
    }
}

function setupResize(handleId, axis) {
    const h = document.getElementById(handleId);
    h.addEventListener('mousedown', e => {
        e.preventDefault();
        pushUndo();
        const startX = e.clientX, startY = e.clientY;
        const startCols = state.cols, startRows = state.signals.length;
        const cls = axis === 'col' ? 'resizing-col' : axis === 'row' ? 'resizing-row' : 'resizing-corner';
        document.body.classList.add(cls, 'resizing');
        const move = ev => {
            let changed = false;
            if (axis === 'col' || axis === 'corner') {
                const target = startCols + Math.round((ev.clientX - startX) / state.cellW);
                if (target !== state.cols) { setCols(target); changed = true; }
            }
            if (axis === 'row' || axis === 'corner') {
                const target = startRows + Math.round((ev.clientY - startY) / state.cellH);
                if (target !== state.signals.length) { setRows(target); changed = true; }
            }
            if (changed) render();
        };
        const up = () => {
            document.removeEventListener('mousemove', move);
            document.removeEventListener('mouseup', up);
            document.body.classList.remove(cls, 'resizing');
            render();
        };
        document.addEventListener('mousemove', move);
        document.addEventListener('mouseup', up);
    });
}

/* =========================================================================
   도구/펜 전환
   ========================================================================= */
function setTool(t) {
    tool = t;
    if (PAINT_PENS.includes(t)) pen = t;
    document.body.classList.toggle('anno-mode', t === 'arrow' || t === 'darrow' || t === 'dline' || t === 'text' || t === 'rect' || t === 'ellipse');
    document.body.classList.toggle('erase-mode', t === 'erase');
    document.body.classList.toggle('move-mode', t === 'move');
    document.body.classList.toggle('annoapply-mode', t === 'annoapply');
    document.body.classList.toggle('select-mode', t === 'select');
    if (t !== 'select') selRect = null;   // 선택 모드를 벗어나면 선택 해제
    highlightSelection();
    document.querySelectorAll('.tool-btn[data-pen]').forEach(b => b.classList.toggle('active', t === b.dataset.pen));
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.toggle('active', t === b.dataset.tool));
}

/* =========================================================================
   유틸
   ========================================================================= */
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}
function placeCaretEnd(el) {
    const r = document.createRange(); r.selectNodeContents(el); r.collapse(false);
    const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r);
}
function copyText(t) {
    if (navigator.clipboard) navigator.clipboard.writeText(t);
}
/* 페이지 내 숫자 입력 모달 (브라우저 prompt 제목줄 회피). 확인=값, 취소=null */
function askNumber(message, def) {
    return new Promise(resolve => {
        const ov = document.createElement('div');
        ov.className = 'modal-overlay';
        ov.innerHTML =
            `<div class="modal-box">
                <div class="modal-msg"></div>
                <input class="modal-input" type="number" step="1">
                <div class="modal-btns">
                    <button class="tool-btn sm modal-cancel">취소</button>
                    <button class="tool-btn sm modal-ok">확인</button>
                </div>
            </div>`;
        ov.querySelector('.modal-msg').textContent = message;
        const inp = ov.querySelector('.modal-input');
        inp.value = def;
        document.body.appendChild(ov);
        inp.focus(); inp.select();
        let done = false;
        const close = val => { if (done) return; done = true; ov.remove(); resolve(val); };
        ov.querySelector('.modal-ok').onclick = () => close(inp.value);
        ov.querySelector('.modal-cancel').onclick = () => close(null);
        ov.addEventListener('mousedown', e => { if (e.target === ov) close(null); }); // 바깥 클릭=취소
        inp.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); close(inp.value); }
            else if (e.key === 'Escape') { e.preventDefault(); close(null); }
        });
    });
}

/* =========================================================================
   이벤트 와이어링
   ========================================================================= */
function wire() {
    document.querySelectorAll('.tool-btn[data-pen]').forEach(b =>
        b.addEventListener('click', () => setTool(b.dataset.pen)));
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b =>
        b.addEventListener('click', () => {
            const t = b.dataset.tool;
            if (t === 'select' && tool === 'select') setTool('bit'); // 다시 누르면 해제(기본 펜으로)
            else setTool(t);
        }));

    // 데이터 색/글자색 = "현재 칠할 색". 바꿔도 기존 버스에는 영향 없음(채우기/새 버스에만 적용)
    $('#fill-color').addEventListener('input', e => { state.fillColor = e.target.value; });
    $('#data-text-color').addEventListener('input', e => { state.textColor = e.target.value; });
    // 주석 선/글자 색 = "현재 색". 새 주석엔 자동 반영, 기존 주석은 '적용'으로만 변경
    $('#line-color').addEventListener('input', e => { state.lineColor = e.target.value; });
    $('#anno-text-color').addEventListener('input', e => { state.annoTextColor = e.target.value; });
    $('#cell-w-input').addEventListener('change', e => { pushUndo(); state.cellW = clamp(+e.target.value || 40, 16, 200); render(); });
    $('#cell-h-input').addEventListener('change', e => { pushUndo(); state.cellH = clamp(+e.target.value || 44, 24, 200); render(); });
    $('#signal-h-input').addEventListener('change', e => { pushUndo(); state.signalH = clamp(+e.target.value || 22, 4, 200); render(); });
    $('#line-width').addEventListener('change', e => { pushUndo(); state.lineWidth = clamp(+e.target.value || 2, 1, 8); render(); });

    $('#row-count').addEventListener('change', e => { pushUndo(); setRows(clamp(+e.target.value || 1, 1, 200)); render(); });
    $('#col-count').addEventListener('change', e => { pushUndo(); setCols(clamp(+e.target.value || 1, 1, 500)); render(); });
    $('#clear-all').addEventListener('click', () => {
        if (!confirm('모든 셀과 주석을 비웁니다. 계속할까요?')) return;
        pushUndo();
        state.signals.forEach(s => { s.cells = s.cells.map(() => emptyCell()); });
        state.annotations = [];
        render();
    });

    $('#capture-btn').addEventListener('click', e => {
        const on = document.body.classList.toggle('capture');
        e.currentTarget.classList.toggle('active', on);
        renderAnnotations(); // 헤더 오프셋 변화 반영
    });
    $('#capture-save').addEventListener('click', saveCaptureJPG);

    $('#copy-wd').addEventListener('click', () => copyText(wdOut.value));
    $('#export-json').addEventListener('click', () => { importIn.value = exportJSONText(); setMsg('현재 상태를 내보냈습니다.', true); });
    $('#copy-json').addEventListener('click', () => { importIn.value = exportJSONText(); copyText(importIn.value); });
    $('#load-json').addEventListener('click', () => importFromText(importIn.value));

    $('#save-file').addEventListener('click', async () => {
        const text = exportJSONText();
        // 탐색기 "다른 이름으로 저장" 창 (Chromium 계열 지원)
        if (window.showSaveFilePicker) {
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: 'waveform.json',
                    types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
                });
                const w = await handle.createWritable();
                await w.write(text);
                await w.close();
                setMsg('저장 완료.', true);
            } catch (e) {
                if (e.name !== 'AbortError') setMsg('저장 실패: ' + e.message, false);
            }
            return;
        }
        // 폴백: 다운로드
        const blob = new Blob([text], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'waveform.json'; a.click();
        URL.revokeObjectURL(url);
    });
    $('#open-file').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
        const f = e.target.files[0];
        if (!f) return;
        const reader = new FileReader();
        reader.onload = () => { importIn.value = reader.result; importFromText(reader.result); };
        reader.readAsText(f);
        fileInput.value = '';
    });

    setupResize('rh-col', 'col');
    setupResize('rh-row', 'row');
    setupResize('rh-corner', 'corner');

    // 키보드 단축키
    document.addEventListener('keydown', e => {
        const t = e.target;
        const editable = t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT' || t.isContentEditable);
        const k = e.key.toLowerCase();

        // Ctrl/Cmd 조합
        if (e.ctrlKey || e.metaKey) {
            if (k === 'z' && !e.shiftKey) {
                if (editable) return;          // 입력칸은 브라우저 기본 undo 사용
                e.preventDefault(); undo();
            } else if (k === 'y' || (k === 'z' && e.shiftKey)) {
                if (editable) return;          // 입력칸은 브라우저 기본 redo 사용
                e.preventDefault(); redo();    // 다시 실행 (Ctrl+Y / Ctrl+Shift+Z)
            } else if (k === 's') {
                e.preventDefault(); $('#save-file').click();  // JSON 저장
            } else if (k === 'c') {
                if (editable) return;          // 입력 중엔 기본 복사
                if (selRect) { e.preventDefault(); copySelection(); }
            } else if (k === 'x') {
                if (editable) return;          // 입력 중엔 기본 잘라내기
                if (selRect) { e.preventDefault(); cutSelection(); }
            } else if (k === 'v') {
                if (editable) return;          // 입력 중엔 기본 붙여넣기
                if (clip && selRect) { e.preventDefault(); pasteClipboard(); }
            }
            return;
        }

        if (editable) return; // 입력 중엔 단축키 무시

        if (k === '1' || k === '0') { e.preventDefault(); setTool('bit'); }
        else if (k === 'd') { e.preventDefault(); setTool('data'); }
        else if (k === 'z') { e.preventDefault(); setTool('z'); }
        else if (k === 'x') { e.preventDefault(); setTool('x'); }
        else if (k === 's') { e.preventDefault(); setTool('shot'); }
        else if (k === 'e') { e.preventDefault(); setTool('clear'); }
        else if (k === 'c') { e.preventDefault(); $('#capture-btn').click(); }
    });
}

/* ---------- 시작 ---------- */
seed();
wire();
setTool('bit');
render();
</script>
